<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Vida de una Letra – Módulo 2</title>
  <link rel="stylesheet" href="../css/modulo2.css" />
</head>
<body>
  <div id="app">
    <!-- Contenedor principal -->
    <header>
      <h1>La Vida de una Letra</h1>
    </header>

    <main>
      <!-- Palabra dinámica -->
      <div id="word-container">
        <span id="word">NO</span>
      </div>

      <!-- Texto de contexto -->
      <div id="context">
        <p id="context-text">Haz clic en la palabra para comenzar el recorrido tipográfico.</p>
      </div>

      <!-- Botones de navegación -->
      <div id="controls">
        <button id="prev">◀ Anterior</button>
        <button id="next">Siguiente ▶</button>
      </div>
    </main>
  </div>

  <script src="../js/modulo2.js"></script>
</body>
</html>
